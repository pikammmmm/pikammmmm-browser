appId: com.pikammmmm.claudebrowser
productName: Claude Browser
copyright: Copyright (c) 2026 Pikammmmm

directories:
  output: dist
  buildResources: build

files:
  - out/**/*
  - package.json

asar: true
asarUnpack:
  - node_modules/better-sqlite3/**/*
  - node_modules/keytar/**/*

win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: ${productName}-${version}-Setup.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true

publish:
  provider: github
  releaseType: release
