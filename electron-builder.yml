appId: com.pikammmmm.claudebrowser
productName: Claude Browser
copyright: Copyright (c) 2026 Pikammmmm

directories:
  output: dist
  buildResources: build

files:
  - out/**/*
  - package.json

asar: true
asarUnpack:
  - node_modules/better-sqlite3/**/*
  - node_modules/keytar/**/*

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico
  artifactName: ${productName}-${version}-Setup.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  installerHeaderIcon: build/icon.ico

# Disable auto-update / publish for now — re-add a `publish:` block once you
# have a GitHub release target or a self-hosted update feed.
publish: null
