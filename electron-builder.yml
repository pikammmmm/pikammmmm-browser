appId: com.pikammmmm.pikammmmmbrowser
productName: Pikammmmm Browser
copyright: Copyright (c) 2026 Pikammmmm

directories:
  output: dist
  buildResources: build

files:
  - out/**/*
  - package.json

extraResources:
  - from: resources/ubol
    to: ubol

asar: true
asarUnpack:
  - node_modules/better-sqlite3/**/*
  - node_modules/keytar/**/*

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico
  artifactName: ${productName}-${version}-Setup.${ext}

mac:
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  icon: build/icon.png
  category: public.app-category.productivity
  artifactName: ${productName}-${version}-${arch}.${ext}
  identity: null

dmg:
  artifactName: ${productName}-${version}-${arch}.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  installerHeaderIcon: build/icon.ico

# Disable auto-update / publish for now — re-add a `publish:` block once you
# have a GitHub release target or a self-hosted update feed.
publish: null
